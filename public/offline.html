<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — NightCravings</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #fbf7f0;
        color: #211c16;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #171310;
          color: #eee7da;
        }
      }
      h1 {
        font-family: Charter, "Iowan Old Style", Georgia, serif;
        font-size: 1.4rem;
        margin: 0 0 8px;
      }
      p {
        max-width: 40ch;
        opacity: 0.7;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1>You're offline</h1>
    <p>
      Checkout and payment always need a live connection — reconnect and try
      again. Anything you already browsed may still be visible if you go back.
    </p>
  </body>
</html>
